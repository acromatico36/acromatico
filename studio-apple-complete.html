<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio — Acromatico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #000;
      color: #f5f5f7;
      font-size: 17px;
      line-height: 1.47059;
      font-weight: 400;
      letter-spacing: -0.022em;
    }
    
    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.8);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    nav {
      max-width: 1024px;
      margin: 0 auto;
      padding: 0 22px;
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo img {
      height: 20px;
      filter: brightness(0) invert(1);
    }
    .nav-links {
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      color: #f5f5f7;
      text-decoration: none;
      font-size: 12px;
      transition: opacity 0.3s ease;
    }
    .nav-links a:hover { opacity: 0.8; }
    
    /* SECTIONS */
    section {
      max-width: 1024px;
      margin: 0 auto;
      padding: 120px 22px;
    }
    
    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      padding-top: 88px;
    }
    h1 {
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 24px;
      line-height: 1.4;
      color: rgba(255,255,255,0.6);
      max-width: 700px;
      margin: 0 auto 48px;
    }
    .cta {
      display: inline-block;
      padding: 16px 40px;
      background: #0071e3;
      color: #fff;
      text-decoration: none;
      border-radius: 980px;
      font-size: 17px;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .cta:hover {
      background: #0077ED;
      transform: scale(1.02);
    }
    
    /* CASE STUDIES */
    .case {
      margin-bottom: 180px;
    }
    .case-label {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0071e3;
      margin-bottom: 16px;
    }
    .case-title {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    .case-description {
      font-size: 21px;
      line-height: 1.5;
      color: rgba(255,255,255,0.7);
      max-width: 900px;
      margin-bottom: 48px;
    }
    
    /* GLASS CARDS */
    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 60px;
      margin: 40px 0;
    }
    
    /* iMAC MOCKUP */
    .imac {
      max-width: 1000px;
      margin: 60px auto;
      position: relative;
    }
    .imac-screen {
      background: #111;
      border-radius: 12px;
      border: 12px solid #222;
      border-bottom: 20px solid #222;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .imac-screen img {
      width: 100%;
      display: block;
    }
    .imac-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 20px;
      background: #000;
      border-radius: 0 0 8px 8px;
    }
    
    /* STATS GRID */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 44px;
      margin: 60px 0;
      text-align: center;
    }
    .stat-value {
      font-size: 64px;
      font-weight: 900;
      color: #0071e3;
      line-height: 1;
      margin-bottom: 12px;
    }
    .stat-label {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    /* GALLERY */
    .gallery {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 24px;
      margin: 60px 0;
    }
    .gallery-card {
      flex: 0 0 420px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
      scroll-snap-align: start;
      transition: transform 0.3s ease;
    }
    .gallery-card:hover {
      transform: translateY(-8px);
    }
    .gallery-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }
    .gallery-card-content {
      padding: 32px;
    }
    .gallery-card-label {
      font-size: 12px;
      font-weight: 700;
      color: #0071e3;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .gallery-card-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 12px;
    }
    .gallery-card-text {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
    }
    .gallery-card-stats {
      display: flex;
      gap: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .gallery-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #0071e3;
    }
    .gallery-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    /* BUILT FOR */
    .built-for {
      background: rgba(0,113,227,0.05);
      border: 1px solid rgba(0,113,227,0.2);
      border-radius: 18px;
      padding: 40px;
      margin: 60px 0;
      text-align: center;
    }
    .built-for h3 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #0071e3;
      margin-bottom: 16px;
    }
    .built-for p {
      font-size: 18px;
      line-height: 1.8;
      color: rgba(255,255,255,0.7);
    }
    .built-for strong {
      color: #0071e3;
      font-weight: 700;
    }
    
    /* FOOTER */
    footer {
      padding: 80px 22px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    footer img {
      height: 32px;
      opacity: 0.3;
      margin-bottom: 32px;
      filter: brightness(0) invert(1);
    }
    footer .nav-links {
      justify-content: center;
      margin-bottom: 24px;
    }
    footer p {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    
    /* RESPONSIVE */
    @media (max-width: 734px) {
      .nav-links { display: none; }
      nav { justify-content: center; }
      h1 { font-size: 48px; }
      .case-title { font-size: 36px; }
      .gallery-card { flex: 0 0 340px; }
    }
  </style>
</head>
<body>
  
  <!-- HEADER -->
  <header>
    <nav>
      <a href="/" class="logo">
        <img src="/static/acromatico-logo-transparent.png" alt="Acromatico">
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/education">Education</a>
        <a href="/studio">Studio</a>
        <a href="/prints">Prints</a>
        <a href="/photography">Photography</a>
        <a href="/contact">Contact</a>
      </div>
    </nav>
  </header>
  
  <!-- HERO -->
  <section class="hero">
    <h1>You dream it.<br>We build it.</h1>
    <p>We build SaaS platforms for fintech, real estate, and e-commerce. Institutional-grade infrastructure. Apple-level design.</p>
    <a href="/contact" class="cta">Start Your Project</a>
  </section>
