<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Pipeline | Acromatico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/relativeTime.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        /* Acromatico Brand Colors */
        :root {
            --acro-primary: #4794A6;
            --acro-primary-hover: #5aa5b8;
            --acro-primary-light: rgba(71, 148, 166, 0.1);
            --acro-dark: #0f172a;
            --acro-surface: #1e293b;
            --acro-border: rgba(71, 148, 166, 0.2);
        }
        
        /* Status Colors */
        .status-discovery { background: #3b82f6; color: white; }
        .status-design { background: #8b5cf6; color: white; }
        .status-development { background: var(--acro-primary); color: white; }
        .status-review { background: #f59e0b; color: white; }
        .status-delivered { background: #10b981; color: white; }
        .status-paused { background: #6b7280; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        
        /* Priority Colors */
        .priority-P1 { border-left: 4px solid #ef4444; }
        .priority-P2 { border-left: 4px solid #f59e0b; }
        .priority-P3 { border-left: 4px solid #3b82f6; }
        .priority-P4 { border-left: 4px solid #6b7280; }
        
        /* Project Card */
        .project-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-color: var(--acro-primary);
        }
        
        /* Pipeline Stage */
        .pipeline-stage {
            min-height: 200px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .desktop-only { display: none; }
        }
    </style>
</head>
<body class="bg-slate-900">

<!-- Top Navigation -->
<nav class="bg-slate-800 shadow-lg border-b border-slate-700 sticky top-0 z-50" style="backdrop-filter: blur(10px); background: rgba(30, 41, 59, 0.95);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-4">
                <img src="/static/acromatico-logo-correct.png" alt="Acromatico" class="h-8" />
                <h1 class="text-xl font-semibold text-white" style="font-family: 'Inter', sans-serif; letter-spacing: -0.02em;">
                    Project Pipeline
                </h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="window.location.href='/admin/crm/dashboard'" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700 rounded-lg transition-all">
                    <i class="fas fa-robot mr-2"></i>CRM
                </button>
                <button onclick="refreshData()" class="px-4 py-2 text-white text-sm font-medium rounded-lg transition-all" style="background: var(--acro-primary);">
                    <i class="fas fa-sync-alt" id="refresh-icon"></i>
                </button>
                <button onclick="logout()" class="px-4 py-2 text-sm font-medium text-red-400 hover:text-red-300 hover:bg-slate-700 rounded-lg transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- Main Container -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    
    <!-- Quick Stats Row -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-slate-800 rounded-xl shadow-lg p-6 border border-slate-700" style="border-color: var(--acro-border);">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-400">Active Projects</p>
                    <p class="text-3xl font-bold text-white" id="stat-active">0</p>
                </div>
                <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: var(--acro-primary-light);">
                    <i class="fas fa-project-diagram text-xl" style="color: var(--acro-primary);"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-slate-800 rounded-xl shadow-lg p-6 border border-slate-700" style="border-color: var(--acro-border);">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-400">At Risk</p>
                    <p class="text-3xl font-bold text-white" id="stat-risk">0</p>
                </div>
                <div class="w-12 h-12 bg-red-900/30 rounded-full flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-red-400 text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-slate-800 rounded-xl shadow-lg p-6 border border-slate-700" style="border-color: var(--acro-border);">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-400">In Discovery</p>
                    <p class="text-3xl font-bold text-white" id="stat-discovery">0</p>
                </div>
                <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: rgba(59, 130, 246, 0.1);">
                    <i class="fas fa-search text-blue-400 text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-slate-800 rounded-xl shadow-lg p-6 border border-slate-700" style="border-color: var(--acro-border);">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-400">Delivered</p>
                    <p class="text-3xl font-bold" style="color: var(--acro-primary);" id="stat-delivered">0</p>
                </div>
                <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: var(--acro-primary-light);">
                    <i class="fas fa-check-circle text-xl" style="color: var(--acro-primary);"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- View Toggle -->
    <div class="mb-6 flex items-center justify-between">
        <div class="flex space-x-4">
            <button onclick="switchView('kanban')" id="view-kanban" class="px-4 py-2 text-sm font-medium rounded-lg" style="background: var(--acro-primary); color: white;">
                <i class="fas fa-columns mr-2"></i>Kanban
            </button>
            <button onclick="switchView('list')" id="view-list" class="px-4 py-2 text-sm font-medium text-slate-300 bg-slate-800 rounded-lg hover:bg-slate-700">
                <i class="fas fa-list mr-2"></i>List
            </button>
            <button onclick="switchView('timeline')" id="view-timeline" class="px-4 py-2 text-sm font-medium text-slate-300 bg-slate-800 rounded-lg hover:bg-slate-700">
                <i class="fas fa-calendar mr-2"></i>Timeline
            </button>
        </div>
        <button onclick="showNewProjectModal()" class="px-4 py-2 text-white text-sm font-medium rounded-lg" style="background: var(--acro-primary);">
            <i class="fas fa-plus mr-2"></i>New Project
        </button>
    </div>

    <!-- Kanban Board View -->
    <div id="kanban-view" class="grid grid-cols-1 md:grid-cols-5 gap-4">
        <!-- Discovery -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-white">
                    <i class="fas fa-search mr-2 text-blue-400"></i>Discovery
                </h3>
                <span class="text-sm text-slate-400" id="count-discovery">0</span>
            </div>
            <div id="column-discovery" class="pipeline-stage space-y-3">
                <!-- Projects will be inserted here -->
            </div>
        </div>
        
        <!-- Design -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-white">
                    <i class="fas fa-palette mr-2 text-purple-400"></i>Design
                </h3>
                <span class="text-sm text-slate-400" id="count-design">0</span>
            </div>
            <div id="column-design" class="pipeline-stage space-y-3">
                <!-- Projects will be inserted here -->
            </div>
        </div>
        
        <!-- Development -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-white">
                    <i class="fas fa-code mr-2" style="color: var(--acro-primary);"></i>Development
                </h3>
                <span class="text-sm text-slate-400" id="count-development">0</span>
            </div>
            <div id="column-development" class="pipeline-stage space-y-3">
                <!-- Projects will be inserted here -->
            </div>
        </div>
        
        <!-- Review -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-white">
                    <i class="fas fa-eye mr-2 text-yellow-400"></i>Review
                </h3>
                <span class="text-sm text-slate-400" id="count-review">0</span>
            </div>
            <div id="column-review" class="pipeline-stage space-y-3">
                <!-- Projects will be inserted here -->
            </div>
        </div>
        
        <!-- Delivered -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-white">
                    <i class="fas fa-check-circle mr-2 text-green-400"></i>Delivered
                </h3>
                <span class="text-sm text-slate-400" id="count-delivered">0</span>
            </div>
            <div id="column-delivered" class="pipeline-stage space-y-3">
                <!-- Projects will be inserted here -->
            </div>
        </div>
    </div>

    <!-- List View (Hidden by default) -->
    <div id="list-view" class="hidden">
        <div class="bg-slate-800 rounded-xl border border-slate-700">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="border-b border-slate-700">
                        <tr>
                            <th class="text-left p-4 text-sm font-semibold text-slate-300">Project</th>
                            <th class="text-left p-4 text-sm font-semibold text-slate-300">Client</th>
                            <th class="text-left p-4 text-sm font-semibold text-slate-300">Status</th>
                            <th class="text-left p-4 text-sm font-semibold text-slate-300">Priority</th>
                            <th class="text-left p-4 text-sm font-semibold text-slate-300">Deadline</th>
                            <th class="text-left p-4 text-sm font-semibold text-slate-300">Progress</th>
                        </tr>
                    </thead>
                    <tbody id="project-list-body" class="text-sm">
                        <!-- Rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Timeline View (Hidden by default) -->
    <div id="timeline-view" class="hidden">
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6">
            <h3 class="text-lg font-semibold text-white mb-4">Upcoming Deadlines</h3>
            <div id="timeline-container" class="space-y-4">
                <!-- Timeline items will be inserted here -->
            </div>
        </div>
    </div>

</div>

<script>
dayjs.extend(dayjs_plugin_relativeTime);

// Auth check
const ADMIN_TOKEN = localStorage.getItem('admin_token');
if (!ADMIN_TOKEN) {
    window.location.href = '/admin/crm/login';
}

axios.defaults.headers.common['Authorization'] = `Bearer ${ADMIN_TOKEN}`;

// State
let currentView = 'kanban';
let projectsData = [];

// Logout
function logout() {
    localStorage.removeItem('admin_token');
    document.cookie = 'admin_token=; path=/; max-age=0';
    window.location.href = '/admin/crm/login';
}

// Switch View
function switchView(view) {
    currentView = view;
    
    // Update buttons
    ['kanban', 'list', 'timeline'].forEach(v => {
        const btn = document.getElementById(`view-${v}`);
        if (v === view) {
            btn.style.background = 'var(--acro-primary)';
            btn.style.color = 'white';
        } else {
            btn.style.background = '#1e293b';
            btn.style.color = 'rgb(148, 163, 184)';
        }
    });
    
    // Show/hide views
    document.getElementById('kanban-view').classList.toggle('hidden', view !== 'kanban');
    document.getElementById('list-view').classList.toggle('hidden', view !== 'list');
    document.getElementById('timeline-view').classList.toggle('hidden', view !== 'timeline');
    
    if (view !== 'kanban') {
        renderView();
    }
}

// Refresh Data
async function refreshData() {
    const icon = document.getElementById('refresh-icon');
    icon.classList.add('fa-spin');
    
    try {
        // Fetch overview stats
        const overviewRes = await axios.get('/api/pipeline/overview');
        const { stats } = overviewRes.data;
        
        document.getElementById('stat-active').textContent = stats.active || 0;
        document.getElementById('stat-risk').textContent = stats.at_risk || 0;
        
        // Update status counts
        const statusMap = {};
        (stats.by_status || []).forEach(s => {
            statusMap[s.status] = s.count;
        });
        
        document.getElementById('stat-discovery').textContent = statusMap.discovery || 0;
        document.getElementById('stat-delivered').textContent = statusMap.delivered || 0;
        
        // Fetch all projects
        const projectsRes = await axios.get('/api/projects?limit=100');
        projectsData = projectsRes.data.projects || [];
        
        // Render current view
        if (currentView === 'kanban') {
            renderKanban();
        } else {
            renderView();
        }
        
    } catch (error) {
        console.error('Error refreshing data:', error);
        alert('Failed to load data');
    } finally {
        icon.classList.remove('fa-spin');
    }
}

// Render Kanban Board
function renderKanban() {
    const stages = ['discovery', 'design', 'development', 'review', 'delivered'];
    
    stages.forEach(stage => {
        const column = document.getElementById(`column-${stage}`);
        const projects = projectsData.filter(p => p.status === stage);
        
        document.getElementById(`count-${stage}`).textContent = projects.length;
        
        if (projects.length === 0) {
            column.innerHTML = '<p class="text-slate-500 text-sm text-center py-4">No projects</p>';
            return;
        }
        
        column.innerHTML = projects.map(project => `
            <div class="project-card priority-${project.priority} bg-slate-700 rounded-lg p-4 border border-slate-600" onclick="viewProject('${project.id}')">
                <h4 class="font-semibold text-white text-sm mb-2">${project.project_name}</h4>
                <div class="flex items-center justify-between text-xs mb-2">
                    <span class="px-2 py-1 rounded status-${project.status}">${project.status.toUpperCase()}</span>
                    <span class="text-slate-400">${project.priority}</span>
                </div>
                ${project.target_delivery ? `
                    <div class="text-xs text-slate-400 mb-2">
                        <i class="fas fa-calendar mr-1"></i>
                        ${dayjs(project.target_delivery).format('MMM D')}
                    </div>
                ` : ''}
                ${project.progress_percent ? `
                    <div class="w-full bg-slate-600 rounded-full h-1.5">
                        <div class="h-1.5 rounded-full" style="background: var(--acro-primary); width: ${project.progress_percent}%;"></div>
                    </div>
                ` : ''}
            </div>
        `).join('');
    });
}

// Render List/Timeline Views
function renderView() {
    if (currentView === 'list') {
        renderList();
    } else if (currentView === 'timeline') {
        renderTimeline();
    }
}

function renderList() {
    const tbody = document.getElementById('project-list-body');
    tbody.innerHTML = projectsData.map(project => `
        <tr class="border-b border-slate-700 hover:bg-slate-700 cursor-pointer" onclick="viewProject('${project.id}')">
            <td class="p-4 text-white">${project.project_name}</td>
            <td class="p-4 text-slate-300">${project.client_id}</td>
            <td class="p-4">
                <span class="px-2 py-1 rounded text-xs status-${project.status}">${project.status.toUpperCase()}</span>
            </td>
            <td class="p-4"><span class="text-xs text-slate-300">${project.priority}</span></td>
            <td class="p-4 text-slate-300">${project.target_delivery ? dayjs(project.target_delivery).format('MMM D, YYYY') : 'TBD'}</td>
            <td class="p-4 text-slate-300">${project.progress_percent || 0}%</td>
        </tr>
    `).join('');
}

function renderTimeline() {
    const container = document.getElementById('timeline-container');
    const upcoming = projectsData
        .filter(p => p.target_delivery && p.status !== 'delivered')
        .sort((a, b) => new Date(a.target_delivery) - new Date(b.target_delivery));
    
    container.innerHTML = upcoming.map(project => `
        <div class="flex items-center justify-between p-4 bg-slate-700 rounded-lg priority-${project.priority} cursor-pointer" onclick="viewProject('${project.id}')">
            <div class="flex-1">
                <h4 class="font-semibold text-white text-sm">${project.project_name}</h4>
                <p class="text-xs text-slate-400 mt-1">
                    <span class="px-2 py-1 rounded status-${project.status}">${project.status.toUpperCase()}</span>
                </p>
            </div>
            <div class="text-right">
                <p class="text-sm text-white">${dayjs(project.target_delivery).format('MMM D, YYYY')}</p>
                <p class="text-xs text-slate-400">${dayjs(project.target_delivery).fromNow()}</p>
            </div>
        </div>
    `).join('');
}

// View Project Details
function viewProject(projectId) {
    alert(`Project details for ${projectId}\n\nThis will open a detailed modal with:\n- Milestones\n- Deliverables\n- Team members\n- Timeline\n- Budget tracking\n- Activity log`);
}

// New Project Modal
function showNewProjectModal() {
    alert('New Project Modal\n\nThis will open a form with:\n- Client selection\n- Project name & type\n- Timeline & budget\n- Team assignment\n- Initial milestones');
}

// Initial load
refreshData();
</script>

</body>
</html>
