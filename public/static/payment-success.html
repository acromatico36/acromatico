<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - Acromatico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    
    .success-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    
    .checkmark-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.5s ease-out;
    }
    
    .checkmark {
      font-size: 48px;
      color: white;
      animation: checkmarkPop 0.6s ease-out 0.3s both;
    }
    
    @keyframes scaleIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    @keyframes checkmarkPop {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .btn {
      padding: 16px 32px;
      background: #4794A6;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      margin-top: 8px;
    }
    
    .btn:hover {
      background: #5aa5b8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(71, 148, 166, 0.3);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      margin-left: 12px;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .info-box {
      background: rgba(71, 148, 166, 0.1);
      border: 1px solid rgba(71, 148, 166, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-top: 32px;
      text-align: left;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .info-row:last-child {
      border-bottom: none;
    }
    
    .info-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }
    
    .info-value {
      color: #fff;
      font-weight: 600;
    }
    
    @media (max-width: 480px) {
      .success-container {
        padding: 32px 24px;
      }
      
      h1 {
        font-size: 28px;
      }
      
      .btn {
        width: 100%;
        margin-left: 0 !important;
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="checkmark-circle">
      <i class="fas fa-check checkmark"></i>
    </div>
    
    <h1 style="font-size: 32px; font-weight: 300; margin-bottom: 12px;">Payment Successful!</h1>
    <p style="color: rgba(255, 255, 255, 0.7); font-size: 16px; margin-bottom: 24px;">
      Thank you for your booking. We've received your payment and will send you a confirmation email shortly.
    </p>
    
    <div class="info-box" id="bookingDetails">
      <div class="info-row">
        <span class="info-label">Session ID</span>
        <span class="info-value" id="sessionId">Loading...</span>
      </div>
      <div class="info-row">
        <span class="info-label">Status</span>
        <span class="info-value" style="color: #22c55e;">
          <i class="fas fa-check-circle mr-1"></i>
          Confirmed
        </span>
      </div>
    </div>
    
    <div style="margin-top: 32px;">
      <p style="color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: 16px;">
        <i class="fas fa-envelope mr-2"></i>
        Check your email for booking details and next steps
      </p>
      
      <a href="/" class="btn">
        <i class="fas fa-home mr-2"></i>
        Back to Home
      </a>
      
      <a href="/photography" class="btn btn-secondary">
        <i class="fas fa-camera mr-2"></i>
        View Services
      </a>
    </div>
    
    <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
      <p style="color: rgba(255, 255, 255, 0.5); font-size: 12px;">
        Questions? Contact us at <a href="mailto:info@acromatico.com" style="color: #4794A6; text-decoration: none;">info@acromatico.com</a>
      </p>
    </div>
  </div>
  
  <script>
    // Get session ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');
    
    if (sessionId) {
      // Display session ID (truncated for security)
      const truncatedId = sessionId.substring(0, 20) + '...';
      document.getElementById('sessionId').textContent = truncatedId;
      
      // Log full session ID for debugging
      console.log('Stripe Checkout Session ID:', sessionId);
      
      // Optional: Send to analytics or backend for tracking
      // fetch('/api/analytics/track-conversion', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({ sessionId, timestamp: new Date().toISOString() })
      // });
    } else {
      document.getElementById('sessionId').textContent = 'N/A';
    }
  </script>
</body>
</html>
