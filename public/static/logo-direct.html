<!DOCTYPE html>
<html>
<head>
    <title>Direct Logo Test</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body style="padding: 50px; background: #f0f0f0;">
    <h1>DIRECT LOGO TEST</h1>
    <p>Timestamp: <script>document.write(Date.now())</script></p>
    
    <h2>Method 1: IMG tag with cache buster</h2>
    <img id="logo1" style="border: 3px solid red; background: white; padding: 10px;" alt="Logo 1">
    <script>
        document.getElementById('logo1').src = '/static/acromatico-logo-dark.png?v=' + Date.now();
    </script>
    
    <h2>Method 2: Direct path</h2>
    <img src="/static/acromatico-logo-dark.png" style="border: 3px solid blue; background: white; padding: 10px;" alt="Logo 2">
    
    <h2>Method 3: Absolute URL</h2>
    <img id="logo3" style="border: 3px solid green; background: white; padding: 10px;" alt="Logo 3">
    <script>
        document.getElementById('logo3').src = window.location.origin + '/static/acromatico-logo-dark.png?' + Math.random();
    </script>
    
    <h2>Test fetch API:</h2>
    <div id="fetchResult" style="border: 2px solid orange; padding: 10px; background: white;"></div>
    <script>
        fetch('/static/acromatico-logo-dark.png')
            .then(r => {
                document.getElementById('fetchResult').innerHTML = 
                    'Status: ' + r.status + '<br>' +
                    'Content-Type: ' + r.headers.get('content-type') + '<br>' +
                    'Size: ' + r.headers.get('content-length') + ' bytes';
            })
            .catch(e => {
                document.getElementById('fetchResult').innerHTML = 'ERROR: ' + e.message;
            });
    </script>
</body>
</html>
