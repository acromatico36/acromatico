<!DOCTYPE html>

<html>
<head>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
body { margin: 0; padding: 20px; background: #f0f0f0; }
.info { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
.test { margin-bottom: 40px; }
.test h2 { margin-bottom: 10px; }

/* DESKTOP BASE */
.gallery-item {
    width: 100%;
    height: 400px;
    overflow: hidden;
    border: 3px solid red;
    position: relative;
    margin-bottom: 10px;
}
.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
}

/* MOBILE */
@media (max-width: 768px) {
    .gallery-item { 
        height: 200px !important;
        border-color: green !important;
    }
    .gallery-item img {
        height: 200px !important;
        max-height: 200px !important;
        min-height: 200px !important;
    }
}

/* TABLET */
@media (min-width: 769px) and (max-width: 1024px) {
    .gallery-item {
        height: 220px !important;
        border-color: blue !important;
    }
    .gallery-item img {
        height: 220px !important;
        max-height: 220px !important;
        min-height: 220px !important;
    }
}
</style>
<script type="application/ld+json">

  "@context": "https://schema.org",
  "@type": "Article",

    "jobTitle": "Professional Photographer",
    "worksFor": {
      "@type": "Organization",
      "name": "Acromatico Photography"
    }
  },
  "publisher": {
    "@type": "Organization",
    "name": "Acromatico Photography",
    "url": "https://acromatico.com",
    "logo": {
      "@type": "ImageObject",
      "url": "https://acromatico.com/static/acromatico-logo-dark.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://acromatico.com/static/blog/mobile-test-simple.html"
  }

</script><script type="application/ld+json">

    {

    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "Acromatico Photography Blog Post",
      "item": "https://acromatico.com/static/blog/mobile-test-simple.html"
    }
  ]
}
</script></head>
<body>
<div class="info">
<strong>Screen:</strong> <span id="w"></span>px<br/>
<strong>Expected:</strong> <span id="expected"></span>
</div>
<div class="test">
<h2>Test 1: Lake Como Image</h2>
<div class="gallery-item">
<img src="https://acromatico.com/wp-content/uploads/2023/10/Lake-Como-Family-Session-O-2.jpeg"/>
</div>
</div>
<div class="test">
<h2>Test 2: Placeholder</h2>
<div class="gallery-item">
<img src="https://via.placeholder.com/800x1200/ff0000/ffffff?text=Portrait"/>
</div>
</div>
<script>
const w = window.innerWidth;
document.getElementById('w').textContent = w;
if (w <= 768) {
    document.getElementById('expected').textContent = 'GREEN border, 200px height';
} else if (w >= 769 && w <= 1024) {
    document.getElementById('expected').textContent = 'BLUE border, 220px height';
} else {
    document.getElementById('expected').textContent = 'RED border, 400px height';
}
</script>
</body>
</html>
