<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Intelligence Assessment — Acromatico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #000;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
      flex: 1;
    }
    h1 {
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 21px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 60px;
      line-height: 1.5;
    }
    
    #chat-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 100px;
      min-height: 400px;
    }
    
    .message {
      display: flex;
      gap: 16px;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.ai {
      flex-direction: row;
    }
    
    .message.user {
      flex-direction: row-reverse;
    }
    
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0071e3, #00a3ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .message.user .avatar {
      background: linear-gradient(135deg, #4794A6, #5aa5b8);
    }
    
    .message-content {
      flex: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 20px 24px;
      font-size: 17px;
      line-height: 1.6;
      max-width: 85%;
    }
    
    .message.user .message-content {
      background: rgba(71,148,166,0.1);
      border-color: rgba(71,148,166,0.3);
      text-align: right;
    }
    
    .input-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 24px;
      z-index: 100;
    }
    
    .input-wrapper {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 16px 24px;
      font-size: 17px;
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
    }
    
    #user-input:focus {
      background: rgba(255,255,255,0.1);
      border-color: #0071e3;
    }
    
    #send-btn {
      background: #0071e3;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    #send-btn:hover:not(:disabled) {
      background: #0077ED;
      transform: scale(1.05);
    }
    
    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 16px;
    }
    
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
    
    .insight-card {
      background: linear-gradient(135deg, rgba(0,113,227,0.1) 0%, rgba(71,148,166,0.1) 100%);
      border: 1px solid rgba(0,113,227,0.3);
      border-radius: 18px;
      padding: 24px;
      margin: 16px 0;
    }
    
    .insight-card h3 {
      font-size: 21px;
      font-weight: 700;
      color: #0071e3;
      margin-bottom: 12px;
    }
    
    .insight-card ul {
      list-style: none;
      padding: 0;
    }
    
    .insight-card li {
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
    }
    
    .insight-card li:before {
      content: "→";
      position: absolute;
      left: 0;
      color: #0071e3;
      font-weight: 700;
    }
    
    @media (max-width: 734px) {
      h1 { font-size: 36px; }
      .subtitle { font-size: 18px; }
      .message-content { max-width: 100%; font-size: 15px; }
      .input-wrapper { flex-direction: column; }
      #user-input { width: 100%; }
    }
  </style>
</head>
<body>
  
  <div class="container">
    <h1>Brand Intelligence Assessment</h1>
    <p class="subtitle">Just start typing below. Tell me about your brand and I'll give you a complete strategic analysis.</p>
    
    <div id="chat-container"></div>
  </div>
  
  <div class="input-container">
    <div class="input-wrapper">
      <input 
        type="text" 
        id="user-input" 
        placeholder="Tell me about your brand... (e.g., 'I run a fitness apparel company targeting millennial women')" 
        autofocus
      />
      <button id="send-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
  
  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    
    let conversationStarted = false;
    let userData = {
      initial: '',
      audience: '',
      challenge: '',
      revenue: ''
    };
    
    let currentQuestion = '';
    
    function addMessage(content, type = 'ai') {
      const message = document.createElement('div');
      message.className = `message ${type}`;
      message.innerHTML = `
        <div class="avatar">${type === 'ai' ? '🎯' : '👤'}</div>
        <div class="message-content">${content}</div>
      `;
      chatContainer.appendChild(message);
      message.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    function showTyping() {
      const typing = document.createElement('div');
      typing.className = 'message ai';
      typing.id = 'typing';
      typing.innerHTML = `
        <div class="avatar">🎯</div>
        <div class="message-content">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      chatContainer.appendChild(typing);
      typing.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }
    
    async function analyzeInitialMessage(message) {
      // Parse industry/niche from initial message
      const lowerMsg = message.toLowerCase();
      let industry = 'your niche';
      
      if (lowerMsg.includes('fitness') || lowerMsg.includes('gym') || lowerMsg.includes('workout')) {
        industry = 'fitness';
      } else if (lowerMsg.includes('saas') || lowerMsg.includes('software') || lowerMsg.includes('tech')) {
        industry = 'SaaS/tech';
      } else if (lowerMsg.includes('ecommerce') || lowerMsg.includes('e-commerce') || lowerMsg.includes('online store')) {
        industry = 'e-commerce';
      } else if (lowerMsg.includes('real estate') || lowerMsg.includes('property')) {
        industry = 'real estate';
      } else if (lowerMsg.includes('beauty') || lowerMsg.includes('skincare') || lowerMsg.includes('cosmetics')) {
        industry = 'beauty/skincare';
      }
      
      userData.initial = message;
      
      showTyping();
      await new Promise(resolve => setTimeout(resolve, 1500));
      hideTyping();
      
      const response = `Got it! So you're in <strong>${industry}</strong>. That's a competitive space—which means there's huge opportunity if you position correctly.<br><br>Quick question: <strong>Who's your ideal customer?</strong> Be specific. (e.g., "busy moms 30-45 who prioritize organic products", "B2B SaaS founders with 10-50 employees")`;
      
      addMessage(response);
      currentQuestion = 'audience';
    }
    
    async function handleAudienceAnswer(message) {
      userData.audience = message;
      
      showTyping();
      await new Promise(resolve => setTimeout(resolve, 1500));
      hideTyping();
      
      const response = `Perfect. Crystal clear target.<br><br>Now tell me: <strong>What's your BIGGEST challenge right now?</strong> (e.g., "getting consistent traffic", "converting visitors to customers", "standing out from competitors", "scaling profitably")`;
      
      addMessage(response);
      currentQuestion = 'challenge';
    }
    
    async function handleChallengeAnswer(message) {
      userData.challenge = message;
      
      showTyping();
      await new Promise(resolve => setTimeout(resolve, 1500));
      hideTyping();
      
      const response = `I see. That's a common growth blocker—but totally solvable.<br><br>Last question: <strong>What's your current monthly revenue?</strong> (e.g., "pre-revenue", "$0-5K", "$5K-25K", "$25K-100K", "$100K+")`;
      
      addMessage(response);
      currentQuestion = 'revenue';
    }
    
    async function generateReport(message) {
      userData.revenue = message;
      
      showTyping();
      await new Promise(resolve => setTimeout(resolve, 2500));
      hideTyping();
      
      // Generate comprehensive report
      const report = `
        <strong>🎯 Brand Intelligence Report</strong><br><br>
        Based on your answers, here's your complete strategic analysis:<br><br>
        
        <div class="insight-card">
          <h3>📊 Current Position</h3>
          <ul>
            <li><strong>Brand context:</strong> ${userData.initial}</li>
            <li><strong>Target customer:</strong> ${userData.audience}</li>
            <li><strong>Primary challenge:</strong> ${userData.challenge}</li>
            <li><strong>Revenue stage:</strong> ${userData.revenue}</li>
          </ul>
        </div>
        
        <div class="insight-card">
          <h3>🚀 Strategic Positioning</h3>
          <ul>
            <li><strong>Differentiation angle:</strong> Position yourself as the ONLY solution that solves "${userData.challenge}" specifically for "${userData.audience}"</li>
            <li><strong>Content focus:</strong> Create content that educates your audience on solving their version of "${userData.challenge}"</li>
            <li><strong>Channel strategy:</strong> Go where ${userData.audience} actually spend time—not where YOU think they are</li>
            <li><strong>Messaging hook:</strong> Lead with the problem (${userData.challenge}), not your product</li>
          </ul>
        </div>
        
        <div class="insight-card">
          <h3>💡 Immediate Action Plan</h3>
          <ul>
            <li><strong>Week 1:</strong> Define your unique positioning statement in one sentence</li>
            <li><strong>Week 2:</strong> Create 10 pieces of content addressing "${userData.challenge}" from different angles</li>
            <li><strong>Week 3:</strong> Build a simple lead magnet that solves ONE micro-problem for ${userData.audience}</li>
            <li><strong>Week 4:</strong> Launch a repeatable customer acquisition system</li>
          </ul>
        </div>
        
        <div class="insight-card">
          <h3>🎯 Growth Multipliers</h3>
          <ul>
            <li>Focus on lifetime value, not just acquisition cost</li>
            <li>Build a content system, not random posts</li>
            <li>Optimize for retention before scaling acquisition</li>
            <li>Track one metric that matters most at your stage</li>
          </ul>
        </div>
        
        <br><br>
        <strong>Want help implementing this strategy?</strong><br>
        We build complete systems—from positioning to platforms to content engines.<br>
        <a href="/contact" style="color: #0071e3; text-decoration: underline; font-weight: 600;">Book a strategy call →</a>
      `;
      
      addMessage(report);
      userInput.disabled = true;
      sendBtn.disabled = true;
      userInput.placeholder = "Assessment complete! Your strategic report is above ↑";
    }
    
    async function handleMessage() {
      const message = userInput.value.trim();
      if (!message) return;
      
      addMessage(message, 'user');
      userInput.value = '';
      userInput.disabled = true;
      sendBtn.disabled = true;
      
      if (!conversationStarted) {
        conversationStarted = true;
        await analyzeInitialMessage(message);
      } else if (currentQuestion === 'audience') {
        await handleAudienceAnswer(message);
      } else if (currentQuestion === 'challenge') {
        await handleChallengeAnswer(message);
      } else if (currentQuestion === 'revenue') {
        await generateReport(message);
        return; // Don't re-enable input
      }
      
      userInput.disabled = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
    
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleMessage();
    });
    
    sendBtn.addEventListener('click', handleMessage);
    
    // Auto-focus on load
    setTimeout(() => userInput.focus(), 100);
  </script>

</body>
</html>
