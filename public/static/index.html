<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Acromatico — Photography, Education, Prints & Studio</title>
    <meta name="description" content="Award-winning photography and visual education. South Florida + NYC. We help people see differently.">
    <meta name="keywords" content="acromatico, photography, education, fine art prints, creative studio, south florida photographer">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://acromatico.com/">
    <meta property="og:title" content="Acromatico — Photography, Education, Prints & Studio">
    <meta property="og:description" content="We help people see differently.">
    <meta property="og:image" content="/static/images/hero-photography-wow.jpg">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://acromatico.com/">
    <meta property="twitter:title" content="Acromatico">
    <meta property="twitter:description" content="We help people see differently.">
    <meta property="twitter:image" content="/static/images/hero-photography-wow.jpg">
    
    <link rel="canonical" href="https://acromatico.com/">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Acromatico",
      "description": "Photography, Education, Art Prints & Creative Studio",
      "url": "https://acromatico.com",
      "logo": "https://acromatico.com/static/acromatico-logo-transparent.png",
      "foundingDate": "2003",
      "founders": [
        {"@type": "Person", "name": "Italo Campilii"},
        {"@type": "Person", "name": "Ale"}
      ],
      "areaServed": ["South Florida", "New York City", "United States"]
    }
    </script>
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* MINIMAL HERO */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }
        
        .hero h1 {
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 300;
            letter-spacing: -2px;
            color: #fff;
        }
        
        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
        }
        
        .portal {
            position: relative;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }
        
        .portal img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .portal:hover img {
            transform: scale(1.05);
        }
        
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 60px;
            transition: background 0.6s ease;
        }
        
        .portal:hover .overlay {
            background: rgba(0, 0, 0, 0.2);
        }
        
        .overlay h2 {
            font-size: clamp(32px, 4vw, 56px);
            font-weight: 500;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        
        .overlay p {
            font-size: 16px;
            font-weight: 300;
            opacity: 0.9;
            max-width: 400px;
            line-height: 1.5;
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .portal {
                height: 70vh;
            }
            
            .overlay {
                padding: 40px 30px;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Acromatico</h1>
    </section>
    
    <div class="grid">
        <a href="/photography" class="portal">
            <img src="/static/images/hero-photography-wow.jpg" alt="Photography">
            <div class="overlay">
                <h2>Photography</h2>
                <p>We capture the moments that matter.</p>
            </div>
        </a>
        
        <a href="/academy" class="portal">
            <img src="/static/images/hero-education-wow.jpg" alt="Education">
            <div class="overlay">
                <h2>Education</h2>
                <p>Teaching young creators to see differently.</p>
            </div>
        </a>
        
        <a href="/prints" class="portal">
            <img src="/static/images/hero-prints-wow.jpg" alt="Art Prints">
            <div class="overlay">
                <h2>Art Prints</h2>
                <p>Limited editions for your walls.</p>
            </div>
        </a>
        
        <a href="/studio" class="portal">
            <img src="/static/images/hero-studio-wow.jpg" alt="Studio">
            <div class="overlay">
                <h2>Studio</h2>
                <p>Content that tells your story.</p>
            </div>
        </a>
    </div>
</body>
</html>
