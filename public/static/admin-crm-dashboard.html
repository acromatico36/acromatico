<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard | Acromatico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/relativeTime.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        /* Health Score Colors */
        .health-excellent { background: #10b981; color: white; }
        .health-good { background: #84cc16; color: white; }
        .health-warning { background: #f59e0b; color: white; }
        .health-critical { background: #ef4444; color: white; }
        
        /* Priority Colors */
        .priority-P1 { border-left: 4px solid #ef4444; }
        .priority-P2 { border-left: 4px solid #f59e0b; }
        .priority-P3 { border-left: 4px solid #3b82f6; }
        .priority-P4 { border-left: 4px solid #6b7280; }
        
        /* Sentiment Badges */
        .sentiment-ANGRY { background: #fecaca; color: #991b1b; }
        .sentiment-FRUSTRATED { background: #fed7aa; color: #9a3412; }
        .sentiment-NEUTRAL { background: #e5e7eb; color: #374151; }
        .sentiment-POSITIVE { background: #d1fae5; color: #065f46; }
        .sentiment-ENTHUSIASTIC { background: #a7f3d0; color: #064e3b; }
        
        /* Smooth transitions */
        .task-card { transition: all 0.3s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .desktop-only { display: none; }
            .mobile-compact { font-size: 0.875rem; }
        }
    </style>
</head>
<body class="bg-gray-50">

<!-- Top Navigation -->
<nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-bold text-gray-900">
                    <i class="fas fa-robot text-blue-600"></i>
                    CRM Intelligence
                </h1>
                <span id="demo-badge" class="hidden px-3 py-1 bg-yellow-100 text-yellow-800 text-xs font-semibold rounded-full">
                    DEMO MODE
                </span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="window.location.href='/admin/crm/analytics'" class="desktop-only px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-chart-line mr-2"></i>Analytics
                </button>
                <button onclick="window.location.href='/admin/curriculum'" class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-graduation-cap mr-2"></i>Academy
                </button>
                <button onclick="refreshAll()" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">
                    <i class="fas fa-sync-alt" id="refresh-icon"></i>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- Main Container -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    
    <!-- Quick Stats Row -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">Inbox</p>
                    <p class="text-3xl font-bold text-gray-900" id="stat-inbox">0</p>
                </div>
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-inbox text-blue-600 text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">Open Tasks</p>
                    <p class="text-3xl font-bold text-gray-900" id="stat-tasks">0</p>
                </div>
                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-tasks text-purple-600 text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">At Risk</p>
                    <p class="text-3xl font-bold text-gray-900" id="stat-risk">0</p>
                </div>
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">Saved Today</p>
                    <p class="text-3xl font-bold text-green-600" id="stat-saved">$0</p>
                </div>
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-dollar-sign text-green-600 text-xl"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="mb-6">
        <div class="border-b border-gray-200">
            <nav class="-mb-px flex space-x-8">
                <button onclick="switchTab('team')" id="tab-team" class="tab-button border-b-2 border-blue-600 py-4 px-1 text-sm font-medium text-blue-600">
                    <i class="fas fa-users mr-2"></i>Team Inbox
                    <span id="badge-team" class="ml-2 bg-blue-100 text-blue-600 py-1 px-2 rounded-full text-xs">0</span>
                </button>
                <button onclick="switchTab('tasks')" id="tab-tasks" class="tab-button border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                    <i class="fas fa-check-square mr-2"></i>Task Pipeline
                    <span id="badge-tasks" class="ml-2 bg-gray-100 text-gray-600 py-1 px-2 rounded-full text-xs">0</span>
                </button>
                <button onclick="switchTab('clients')" id="tab-clients" class="tab-button border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                    <i class="fas fa-heart mr-2"></i>Client Health
                    <span id="badge-clients" class="ml-2 bg-gray-100 text-gray-600 py-1 px-2 rounded-full text-xs">0</span>
                </button>
                <button onclick="switchTab('personal')" id="tab-personal" class="tab-button border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                    <i class="fas fa-comment mr-2"></i>Personal
                    <span id="badge-personal" class="ml-2 bg-gray-100 text-gray-600 py-1 px-2 rounded-full text-xs">0</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- Team Inbox Tab -->
    <div id="content-team" class="tab-content">
        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-gray-900">
                        <i class="fas fa-inbox text-blue-600 mr-2"></i>
                        Unprocessed Messages
                    </h2>
                    <button onclick="testMessage()" class="px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700">
                        <i class="fas fa-plus mr-2"></i>Test Message
                    </button>
                </div>
            </div>
            <div id="inbox-list" class="divide-y divide-gray-200">
                <!-- Messages will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Task Pipeline Tab -->
    <div id="content-tasks" class="tab-content hidden">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Open Column -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-4 bg-gray-50 border-b border-gray-200">
                    <h3 class="font-semibold text-gray-900">
                        <i class="fas fa-circle text-blue-500 mr-2 text-xs"></i>
                        Open (<span id="count-open">0</span>)
                    </h3>
                </div>
                <div id="tasks-open" class="p-4 space-y-3 min-h-[400px]">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>
            
            <!-- In Progress Column -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-4 bg-yellow-50 border-b border-yellow-200">
                    <h3 class="font-semibold text-gray-900">
                        <i class="fas fa-circle text-yellow-500 mr-2 text-xs"></i>
                        In Progress (<span id="count-progress">0</span>)
                    </h3>
                </div>
                <div id="tasks-progress" class="p-4 space-y-3 min-h-[400px]">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>
            
            <!-- Completed Column -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-4 bg-green-50 border-b border-green-200">
                    <h3 class="font-semibold text-gray-900">
                        <i class="fas fa-check-circle text-green-500 mr-2"></i>
                        Completed (<span id="count-completed">0</span>)
                    </h3>
                </div>
                <div id="tasks-completed" class="p-4 space-y-3 min-h-[400px]">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Client Health Tab -->
    <div id="content-clients" class="tab-content hidden">
        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">
                    <i class="fas fa-heart-pulse text-red-600 mr-2"></i>
                    Client Health Monitor
                </h2>
            </div>
            <div id="clients-list" class="divide-y divide-gray-200">
                <!-- Clients will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Personal Messages Tab -->
    <div id="content-personal" class="tab-content hidden">
        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">
                    <i class="fas fa-comment-dots text-purple-600 mr-2"></i>
                    Personal & Relationship Messages
                </h2>
            </div>
            <div id="personal-list" class="divide-y divide-gray-200">
                <!-- Personal messages will be loaded here -->
            </div>
        </div>
    </div>

</div>

<script>
dayjs.extend(dayjs_plugin_relativeTime)

// Admin JWT token
const ADMIN_TOKEN = 'eyJ1c2VySWQiOiJpdGFsby1hZG1pbiIsImVtYWlsIjoiaXRhbG9AYWNyb21hdGljby5jb20iLCJyb2xlIjoiYWRtaW4iLCJleHAiOjE4MDU4NTA5OTM2ODR9'

// Axios defaults
axios.defaults.headers.common['Authorization'] = `Bearer ${ADMIN_TOKEN}`

// State
let currentTab = 'team'
let messagesData = []
let tasksData = []
let clientsData = []

// Tab Switching
function switchTab(tab) {
    currentTab = tab
    
    // Update tab buttons
    document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('border-blue-600', 'text-blue-600')
        btn.classList.add('border-transparent', 'text-gray-500')
    })
    document.getElementById(`tab-${tab}`).classList.remove('border-transparent', 'text-gray-500')
    document.getElementById(`tab-${tab}`).classList.add('border-blue-600', 'text-blue-600')
    
    // Show/hide content
    document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'))
    document.getElementById(`content-${tab}`).classList.remove('hidden')
    
    // Load data if needed
    if (tab === 'team') loadInbox()
    if (tab === 'tasks') loadTasks()
    if (tab === 'clients') loadClients()
    if (tab === 'personal') loadPersonalMessages()
}

// Load Team Inbox
async function loadInbox() {
    try {
        const response = await axios.get('/api/crm/tasks?status=open&limit=50')
        const tasks = response.data.tasks || []
        
        const unprocessed = tasks.filter(t => !t.assigned_to)
        document.getElementById('stat-inbox').textContent = unprocessed.length
        document.getElementById('badge-team').textContent = unprocessed.length
        
        const html = unprocessed.length === 0 
            ? `<div class="p-12 text-center">
                <i class="fas fa-check-circle text-green-500 text-6xl mb-4"></i>
                <h3 class="text-xl font-semibold text-gray-900 mb-2">Inbox Zero Achieved! 🎉</h3>
                <p class="text-gray-600">All messages have been processed.</p>
               </div>`
            : unprocessed.map(task => `
                <div class="p-6 hover:bg-gray-50 cursor-pointer task-card priority-${task.priority}" onclick="viewTask('${task.id}')">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="sentiment-${task.message_sentiment} px-2 py-1 rounded text-xs font-semibold">
                                    ${task.message_sentiment}
                                </span>
                                <span class="px-2 py-1 rounded text-xs font-semibold ${
                                    task.priority === 'P1' ? 'bg-red-100 text-red-700' :
                                    task.priority === 'P2' ? 'bg-orange-100 text-orange-700' :
                                    task.priority === 'P3' ? 'bg-blue-100 text-blue-700' :
                                    'bg-gray-100 text-gray-700'
                                }">
                                    ${task.priority} - ${task.effort} (${task.estimated_hours}h)
                                </span>
                            </div>
                            <h4 class="font-semibold text-gray-900 mb-1">${task.title}</h4>
                            <p class="text-sm text-gray-600 mb-2 line-clamp-2">${task.original_message}</p>
                            <div class="flex items-center space-x-4 text-xs text-gray-500">
                                <span><i class="fas fa-user mr-1"></i>${task.client_name}</span>
                                <span><i class="fas fa-briefcase mr-1"></i>${task.project_name}</span>
                                <span><i class="fas fa-clock mr-1"></i>${dayjs(task.created_at).fromNow()}</span>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); claimTask('${task.id}')" class="ml-4 px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
                            Claim
                        </button>
                    </div>
                </div>
            `).join('')
        
        document.getElementById('inbox-list').innerHTML = html
        
    } catch (error) {
        console.error('Failed to load inbox:', error)
        document.getElementById('inbox-list').innerHTML = `
            <div class="p-6 text-center text-red-600">
                <i class="fas fa-exclamation-circle text-3xl mb-2"></i>
                <p>Failed to load messages. Check auth token.</p>
            </div>
        `
    }
}

// Load Tasks (Kanban View)
async function loadTasks() {
    try {
        const response = await axios.get('/api/crm/tasks?limit=100')
        tasksData = response.data.tasks || []
        
        const open = tasksData.filter(t => t.status === 'open')
        const progress = tasksData.filter(t => t.status === 'in_progress')
        const completed = tasksData.filter(t => t.status === 'completed')
        
        document.getElementById('stat-tasks').textContent = open.length
        document.getElementById('badge-tasks').textContent = open.length + progress.length
        document.getElementById('count-open').textContent = open.length
        document.getElementById('count-progress').textContent = progress.length
        document.getElementById('count-completed').textContent = completed.length
        
        renderTaskColumn('tasks-open', open)
        renderTaskColumn('tasks-progress', progress)
        renderTaskColumn('tasks-completed', completed)
        
    } catch (error) {
        console.error('Failed to load tasks:', error)
    }
}

function renderTaskColumn(elementId, tasks) {
    const html = tasks.length === 0
        ? '<p class="text-sm text-gray-400 text-center py-8">No tasks</p>'
        : tasks.map(task => `
            <div class="task-card bg-white border border-gray-200 rounded-lg p-4 priority-${task.priority}" onclick="viewTask('${task.id}')">
                <div class="flex items-start justify-between mb-2">
                    <h4 class="font-semibold text-sm text-gray-900 flex-1">${task.title}</h4>
                    <span class="ml-2 px-2 py-1 text-xs font-semibold rounded ${
                        task.priority === 'P1' ? 'bg-red-100 text-red-700' :
                        task.priority === 'P2' ? 'bg-orange-100 text-orange-700' :
                        'bg-blue-100 text-blue-700'
                    }">
                        ${task.priority}
                    </span>
                </div>
                <p class="text-xs text-gray-600 mb-2 line-clamp-2">${task.description.substring(0, 100)}...</p>
                <div class="flex items-center justify-between text-xs text-gray-500">
                    <span><i class="fas fa-user mr-1"></i>${task.client_name}</span>
                    <span>${task.effort} • ${task.estimated_hours}h</span>
                </div>
                ${task.assigned_to ? `<div class="mt-2 text-xs text-green-600"><i class="fas fa-user-check mr-1"></i>${task.assigned_to}</div>` : ''}
            </div>
        `).join('')
    
    document.getElementById(elementId).innerHTML = html
}

// Load Clients
async function loadClients() {
    try {
        const response = await axios.get('/api/crm/clients')
        clientsData = response.data.clients || []
        
        document.getElementById('badge-clients').textContent = clientsData.length
        
        // Count at-risk clients
        const atRisk = clientsData.filter(c => c.health_score && c.health_score < 60).length
        document.getElementById('stat-risk').textContent = atRisk
        
        const html = clientsData.length === 0
            ? '<p class="p-6 text-center text-gray-500">No clients found</p>'
            : clientsData.map(client => {
                const healthScore = client.health_score || 75
                const healthClass = 
                    healthScore >= 80 ? 'health-excellent' :
                    healthScore >= 65 ? 'health-good' :
                    healthScore >= 50 ? 'health-warning' : 'health-critical'
                
                return `
                <div class="p-6 hover:bg-gray-50">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-3 mb-2">
                                <h4 class="font-semibold text-gray-900">${client.name}</h4>
                                <span class="${healthClass} px-3 py-1 rounded-full text-sm font-semibold">
                                    ${healthScore}
                                </span>
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${client.company}</p>
                            <div class="flex items-center space-x-4 text-xs text-gray-500">
                                <span><i class="fas fa-phone mr-1"></i>${client.phone_number}</span>
                                <span><i class="fas fa-envelope mr-1"></i>${client.email}</span>
                                <span><i class="fas fa-crown mr-1"></i>${client.tier.toUpperCase()}</span>
                            </div>
                            <div class="mt-3 flex items-center space-x-4 text-xs">
                                <span class="text-gray-700">
                                    <i class="fas fa-project-diagram mr-1"></i>
                                    ${client.active_projects} active, ${client.total_projects} total
                                </span>
                                <span class="text-green-600">
                                    <i class="fas fa-dollar-sign mr-1"></i>
                                    $${(client.total_spent || 0).toLocaleString()} spent
                                </span>
                            </div>
                        </div>
                        <button onclick="viewClient('${client.id}')" class="ml-4 px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
                            View
                        </button>
                    </div>
                </div>
                `
            }).join('')
        
        document.getElementById('clients-list').innerHTML = html
        
    } catch (error) {
        console.error('Failed to load clients:', error)
    }
}

// Load Personal Messages
async function loadPersonalMessages() {
    try {
        // This would filter messages where message_type = 'PERSONAL'
        // For now, show placeholder
        document.getElementById('personal-list').innerHTML = `
            <div class="p-12 text-center">
                <i class="fas fa-heart text-purple-500 text-6xl mb-4"></i>
                <h3 class="text-xl font-semibold text-gray-900 mb-2">Relationship Messages</h3>
                <p class="text-gray-600">Personal check-ins, feedback, and relationship-building messages appear here.</p>
            </div>
        `
    } catch (error) {
        console.error('Failed to load personal messages:', error)
    }
}

// Claim Task
async function claimTask(taskId) {
    try {
        await axios.put(`/api/crm/tasks/${taskId}`, {
            assigned_to: 'Italo',
            status: 'in_progress'
        })
        
        // Reload current tab
        if (currentTab === 'team') loadInbox()
        if (currentTab === 'tasks') loadTasks()
        
        showToast('Task claimed successfully', 'success')
    } catch (error) {
        console.error('Failed to claim task:', error)
        showToast('Failed to claim task', 'error')
    }
}

// View Task Detail (Modal)
function viewTask(taskId) {
    const task = tasksData.find(t => t.id === taskId)
    if (!task) return
    
    alert(`TASK DETAIL\n\nTitle: ${task.title}\n\nClient: ${task.client_name}\nProject: ${task.project_name}\n\nPriority: ${task.priority}\nEffort: ${task.effort} (${task.estimated_hours}h)\nStatus: ${task.status}\n\nDescription:\n${task.description}\n\nOriginal Message:\n${task.original_message}`)
}

// View Client Detail
function viewClient(clientId) {
    alert(`Client detail modal would open here for: ${clientId}`)
}

// Test Message (Quick Test)
async function testMessage() {
    const testMsg = {
        clientId: 'client-joes-pizza',
        projectId: 'proj-joes-website',
        source: 'portal',
        content: prompt('Enter test message:', 'The homepage looks great! Can we add a customer testimonials section?')
    }
    
    if (!testMsg.content) return
    
    try {
        showToast('Processing message...', 'info')
        const response = await axios.post('/api/crm/process-message', testMsg)
        
        if (response.data.success) {
            showToast(`✅ Message processed! Task ${response.data.message.taskCreated ? 'created' : 'not needed'}`, 'success')
            setTimeout(() => refreshAll(), 1000)
        } else {
            showToast('Failed: ' + response.data.error, 'error')
        }
    } catch (error) {
        console.error('Test message failed:', error)
        showToast('Failed to process message', 'error')
    }
}

// Refresh All Data
async function refreshAll() {
    document.getElementById('refresh-icon').classList.add('fa-spin')
    
    try {
        // Load analytics stats
        const analytics = await axios.get('/api/crm/analytics/dashboard')
        const stats = analytics.data.data
        
        document.getElementById('stat-saved').textContent = '$' + stats.timeSaved.dollarValue.toLocaleString()
        document.getElementById('stat-risk').textContent = stats.clientHealth.critical
        
        // Reload current tab
        if (currentTab === 'team') await loadInbox()
        if (currentTab === 'tasks') await loadTasks()
        if (currentTab === 'clients') await loadClients()
        if (currentTab === 'personal') await loadPersonalMessages()
        
        // Check if demo mode
        const firstTask = tasksData[0]
        if (firstTask && firstTask.title.includes('[DEMO]')) {
            document.getElementById('demo-badge').classList.remove('hidden')
        }
        
    } catch (error) {
        console.error('Refresh failed:', error)
    } finally {
        setTimeout(() => {
            document.getElementById('refresh-icon').classList.remove('fa-spin')
        }, 500)
    }
}

// Toast Notifications
function showToast(message, type = 'info') {
    const colors = {
        success: 'bg-green-600',
        error: 'bg-red-600',
        info: 'bg-blue-600'
    }
    
    const toast = document.createElement('div')
    toast.className = `fixed bottom-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50`
    toast.textContent = message
    document.body.appendChild(toast)
    
    setTimeout(() => toast.remove(), 3000)
}

// Auto-refresh every 30 seconds
setInterval(refreshAll, 30000)

// Initial load
refreshAll()
</script>
