<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Quick Login - Acromatico CRM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(71, 148, 166, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #4794A6;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            min-height: 120px;
            transition: border 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #4794A6;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: 600;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .demo-token {
            background: #fef3c7;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 12px;
            border-left: 4px solid #f59e0b;
        }
        .demo-token code {
            display: block;
            background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(71, 148, 166, 0.2);
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            word-break: break-all;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Quick Login</h1>
        <p class="subtitle">Acromatico CRM - AI-Powered Client Intelligence</p>
        
        <label>Paste Your Admin Token:</label>
        <textarea id="token" placeholder="eyJ..."></textarea>
        
        <button onclick="login()">🔓 Login Now</button>
        
        <div id="status" class="status"></div>
        
        <div class="demo-token">
            <strong>📋 Demo Token:</strong>
            <code>eyJ1c2VySWQiOiJpdGFsby1hZG1pbiIsImVtYWlsIjoiaXRhbG9AYWNyb21hdGljby5jb20iLCJyb2xlIjoiYWRtaW4iLCJleHAiOjE4MDU4NTA5OTM2ODR9</code>
        </div>
    </div>

    <script>
        async function login() {
            const token = document.getElementById('token').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!token) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Please paste a token first';
                return;
            }
            
            statusDiv.className = 'status';
            statusDiv.textContent = '⏳ Validating token...';
            statusDiv.style.display = 'block';
            
            try {
                // Test the token
                const response = await fetch('/api/crm/clients', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (!response.ok) {
                    throw new Error('Token validation failed: ' + response.status);
                }
                
                // Token is valid! Save it
                localStorage.setItem('admin_token', token);
                document.cookie = 'admin_token=' + token + '; path=/; max-age=86400; SameSite=Lax';
                
                // Show success
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ Success! Redirecting to dashboard...';
                
                // Redirect
                setTimeout(() => {
                    window.location.href = '/admin/crm/dashboard';
                }, 1000);
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Login failed: ' + error.message;
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('token').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                login();
            }
        });
    </script>
</body>
</html>
