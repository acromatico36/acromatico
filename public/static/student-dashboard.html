<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Acromatico</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      color: #fff;
      min-height: 100vh;
    }
    
    /* Topbar */
    .topbar {
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      height: 32px;
      width: auto;
    }
    
    .user-menu {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .user-name {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .btn-logout {
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }
    
    /* Main Layout */
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 32px;
    }
    
    /* Welcome Section */
    .welcome-section {
      margin-bottom: 40px;
    }
    
    .welcome-section h1 {
      font-size: 48px;
      font-weight: 300;
      margin-bottom: 8px;
    }
    
    .welcome-section p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s ease;
    }
    
    .stat-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(71, 148, 166, 0.5);
      transform: translateY(-2px);
    }
    
    .stat-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    
    .stat-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 600;
      color: #4794A6;
    }
    
    /* Section Header */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .section-header h2 {
      font-size: 28px;
      font-weight: 400;
    }
    
    .btn-view-all {
      color: #4794A6;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    
    .btn-view-all:hover {
      color: #5aa5b8;
    }
    
    /* Courses Grid */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }
    
    .course-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .course-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      border-color: rgba(71, 148, 166, 0.5);
    }
    
    .course-thumbnail {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #4794A6 0%, #2d5d6a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    
    .course-content {
      padding: 20px;
    }
    
    .course-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .course-description {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    
    .progress-bar-container {
      background: rgba(255, 255, 255, 0.1);
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4794A6 0%, #5aa5b8 100%);
      transition: width 0.3s ease;
    }
    
    .progress-text {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    /* Achievements */
    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }
    
    .achievement-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .achievement-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: scale(1.05);
    }
    
    .achievement-card.locked {
      opacity: 0.4;
    }
    
    .achievement-icon {
      font-size: 48px;
      margin-bottom: 8px;
      filter: grayscale(100%);
    }
    
    .achievement-card:not(.locked) .achievement-icon {
      filter: grayscale(0%);
    }
    
    .achievement-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .achievement-description {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    @media (max-width: 768px) {
      .dashboard-container {
        padding: 24px 16px;
      }
      
      .welcome-section h1 {
        font-size: 32px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .courses-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <a href="/education">
      <img src="/static/acromatico-logo-dark.png" alt="Acromatico" class="logo">
    </a>
    <div class="user-menu">
      <span class="user-name" id="userName">Loading...</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>
  
  <!-- Loading State -->
  <div id="loadingState" class="loading">
    Loading your dashboard...
  </div>
  
  <!-- Dashboard Content -->
  <div id="dashboardContent" class="dashboard-container" style="display: none;">
    <!-- Welcome Section -->
    <div class="welcome-section">
      <h1>Welcome back, <span id="studentName">Student</span>! 👋</h1>
      <p>Keep up the amazing creative work!</p>
    </div>
    
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-label">Courses Enrolled</div>
        <div class="stat-value" id="coursesEnrolled">0</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-label">Lessons Completed</div>
        <div class="stat-value" id="lessonsCompleted">0</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-label">Achievements</div>
        <div class="stat-value" id="achievementsEarned">0</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-label">Day Streak</div>
        <div class="stat-value" id="dayStreak">0</div>
      </div>
    </div>
    
    <!-- My Courses Section -->
    <div class="section-header">
      <h2>My Courses</h2>
      <a href="/education/courses" class="btn-view-all">View All →</a>
    </div>
    
    <div class="courses-grid" id="coursesGrid">
      <!-- Courses loaded dynamically -->
    </div>
    
    <!-- Achievements Section -->
    <div class="section-header">
      <h2>Achievements</h2>
      <a href="/education/achievements" class="btn-view-all">View All →</a>
    </div>
    
    <div class="achievements-grid" id="achievementsGrid">
      <!-- Achievements loaded dynamically -->
    </div>
  </div>
  
  <script>
    // Check authentication
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    if (!token || !user.id) {
      window.location.href = '/education/login';
    }
    
    // Logout function
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/education/login';
    }
    
    // Load dashboard data
    async function loadDashboard() {
      try {
        // Set user name
        document.getElementById('userName').textContent = user.firstName + ' ' + user.lastName;
        document.getElementById('studentName').textContent = user.firstName;
        
        // Fetch REAL dashboard data from API
        const response = await fetch('/api/dashboard/student', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });
        
        if (!response.ok) {
          throw new Error('Failed to fetch dashboard data');
        }
        
        const data = await response.json();
        
        // Update stats with REAL data
        document.getElementById('coursesEnrolled').textContent = data.stats.coursesEnrolled;
        document.getElementById('lessonsCompleted').textContent = data.stats.lessonsCompleted;
        document.getElementById('achievementsEarned').textContent = data.stats.achievementsEarned;
        document.getElementById('dayStreak').textContent = data.stats.dayStreak;
        
        // Display REAL courses or show empty state
        const coursesGrid = document.getElementById('coursesGrid');
        if (data.courses && data.courses.length > 0) {
          coursesGrid.innerHTML = data.courses.map(course => `
            <div class="course-card" onclick="window.location.href='/course/${course.id}'">
              <div class="course-thumbnail">${course.thumbnail_url || '📚'}</div>
              <div class="course-content">
                <div class="course-title">${course.title}</div>
                <div class="course-description">${course.description || 'No description available'}</div>
                <div class="progress-bar-container">
                  <div class="progress-bar-fill" style="width: ${Math.round(course.progress || 0)}%"></div>
                </div>
                <div class="progress-text">${Math.round(course.progress || 0)}% complete</div>
              </div>
            </div>
          `).join('');
        } else {
          coursesGrid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5);">
              <div style="font-size: 64px; margin-bottom: 20px;">📚</div>
              <h3 style="font-size: 24px; margin-bottom: 12px; color: rgba(255,255,255,0.8);">No Courses Yet</h3>
              <p style="font-size: 16px; margin-bottom: 24px;">Start your creative journey by enrolling in a course!</p>
              <a href="/education/courses" style="display: inline-block; padding: 14px 32px; background: #4794A6; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Browse Courses</a>
            </div>
          `;
        }
        
        // Display REAL achievements
        const achievementsGrid = document.getElementById('achievementsGrid');
        if (data.achievements && data.achievements.length > 0) {
          achievementsGrid.innerHTML = data.achievements.map(achievement => `
            <div class="achievement-card ${achievement.earned ? '' : 'locked'}">
              <div class="achievement-icon">${achievement.icon_url || '🏆'}</div>
              <div class="achievement-name">${achievement.name}</div>
              <div class="achievement-description">${achievement.description}</div>
            </div>
          `).join('');
        } else {
          achievementsGrid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.5);">
              <div style="font-size: 48px; margin-bottom: 16px;">🏆</div>
              <p style="font-size: 16px;">Complete lessons to earn achievements!</p>
            </div>
          `;
        }
        
        // Hide loading, show content
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
        
      } catch (error) {
        console.error('Error loading dashboard:', error);
        document.getElementById('loadingState').textContent = 'Failed to load dashboard. Please refresh.';
      }
    }
    
    // Load on page load
    loadDashboard();
  </script>
</body>
</html>
