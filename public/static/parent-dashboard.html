<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - Acromatico Creator Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
        }
        .child-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .child-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(20, 184, 166, 0.3);
            border-color: rgba(20, 184, 166, 0.5);
        }
        .progress-ring {
            transform: rotate(-90deg);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Header -->
    <div class="max-w-6xl mx-auto mb-8">
        <div class="flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <img src="/static/images/acromatico-logo.png" alt="Acromatico" class="h-10 md:h-12">
            </div>
            
            <div class="flex items-center gap-3">
                <div class="text-right hidden md:block">
                    <p class="text-sm text-gray-400">Parent Account</p>
                    <p class="text-lg font-bold text-white" id="parentName">Loading...</p>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30 border border-red-500/30 transition-all">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Page Title -->
    <div class="max-w-6xl mx-auto mb-8">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">👨‍👩‍👧‍👦 Parent Dashboard</h1>
        <p class="text-gray-400">Monitor your children's creative learning journey</p>
    </div>

    <!-- Children's Progress -->
    <div class="max-w-6xl mx-auto mb-8">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold">Your Children</h2>
            <button onclick="alert('Add child feature coming soon!')" class="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-lg font-medium transition-all">
                <i class="fas fa-plus mr-2"></i>Add Child
            </button>
        </div>
        
        <div id="childrenGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-center py-12 col-span-full">
                <div class="animate-pulse">
                    <i class="fas fa-spinner fa-spin text-3xl text-teal-400 mb-3"></i>
                    <p class="text-gray-400">Loading children...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="max-w-6xl mx-auto mt-12 pt-8 border-t border-gray-800">
        <div class="flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-gray-400">
            <div class="flex items-center gap-3">
                <img src="/static/images/acromatico-logo.png" alt="Acromatico" class="h-6">
                <span>•</span>
                <span>Creator Academy</span>
                <span>•</span>
                <span>© 2026</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="/curriculum" class="hover:text-teal-400 transition-colors">View Curriculum</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const token = localStorage.getItem('auth_token');
        let currentUser = null;

        if (!token) {
            window.location.href = '/education/login';
        }

        // Initialize
        async function init() {
            try {
                const userResponse = await fetch(`${API_BASE}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!userResponse.ok) throw new Error('Auth failed');
                
                const userData = await userResponse.json();
                currentUser = userData.user;
                
                if (currentUser.role !== 'parent') {
                    alert('Access denied: Parent accounts only');
                    window.location.href = '/education/login';
                    return;
                }
                
                document.getElementById('parentName').textContent = currentUser.first_name || currentUser.email;
                
                await loadChildren();
                
            } catch (error) {
                console.error('Init error:', error);
                alert('Failed to load dashboard. Please login again.');
                window.location.href = '/education/login';
            }
        }

        // Load children (simplified - shows message for MVP)
        async function loadChildren() {
            // For MVP, show coming soon message
            document.getElementById('childrenGrid').innerHTML = `
                <div class="text-center py-12 col-span-full">
                    <div class="text-6xl mb-4">🚀</div>
                    <h3 class="text-2xl font-bold mb-2">Parent Portal Coming Soon!</h3>
                    <p class="text-gray-400 mb-6">We're building an amazing parent dashboard where you can:</p>
                    <div class="max-w-md mx-auto text-left space-y-2 mb-6">
                        <p class="text-gray-400"><i class="fas fa-check text-teal-400 mr-2"></i>Monitor your child's progress</p>
                        <p class="text-gray-400"><i class="fas fa-check text-teal-400 mr-2"></i>View completed lessons and projects</p>
                        <p class="text-gray-400"><i class="fas fa-check text-teal-400 mr-2"></i>Track achievements and badges</p>
                        <p class="text-gray-400"><i class="fas fa-check text-teal-400 mr-2"></i>Manage multiple children</p>
                        <p class="text-gray-400"><i class="fas fa-check text-teal-400 mr-2"></i>Download progress reports</p>
                    </div>
                    <p class="text-sm text-gray-500">For now, your children can access their learning through their own accounts.</p>
                </div>
            `;
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('auth_token');
                window.location.href = '/education/login';
            }
        }

        init();
    </script>
</body>
</html>
