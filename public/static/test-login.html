<!DOCTYPE html>
<html>
<head>
    <title>CRM Login Test</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #667eea; color: white; }
        .container { max-width: 600px; margin: 0 auto; background: white; color: #333; padding: 30px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; font-size: 14px; }
        button { background: #667eea; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #5566d8; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 5px; margin: 20px 0; }
        .success { background: #c8e6c9; padding: 15px; border-radius: 5px; margin: 20px 0; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Acromatico CRM Login</h1>
        
        <div class="info">
            <strong>Status:</strong> Login page loaded successfully!<br>
            <strong>URL:</strong> <span id="currentUrl"></span>
        </div>
        
        <h3>Enter Admin Token:</h3>
        <textarea id="token" rows="4" placeholder="Paste JWT token here..." style="font-family: monospace; font-size: 12px;"></textarea>
        
        <button onclick="login()">Access Dashboard</button>
        
        <div id="successMsg" class="success">
            ✅ Token valid! Redirecting to dashboard...
        </div>
        
        <div id="errorMsg" style="color: red; margin-top: 10px; display: none;"></div>
    </div>
    
    <script>
        document.getElementById('currentUrl').textContent = window.location.href;
        
        async function login() {
            const token = document.getElementById('token').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (!token) {
                errorMsg.textContent = 'Please paste your token';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/crm/clients', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.ok) {
                    localStorage.setItem('admin_token', token);
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/admin/crm/dashboard';
                    }, 1000);
                } else {
                    const error = await response.json();
                    errorMsg.textContent = 'Auth failed: ' + (error.error || response.statusText);
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = 'Error: ' + e.message;
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
