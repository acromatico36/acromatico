<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login - Acromatico CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: #0f172a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        :root {
            --acro-primary: #4794A6;
            --acro-primary-hover: #5aa5b8;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(71, 148, 166, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(71, 148, 166, 0.3);
            color: white;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--acro-primary);
            box-shadow: 0 0 0 3px rgba(71, 148, 166, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-primary {
            background: var(--acro-primary);
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(71, 148, 166, 0.39);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--acro-primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(71, 148, 166, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--acro-primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 w-full max-w-md fade-in">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <img src="/static/acromatico-logo-correct.png" alt="Acromatico" class="h-16 mx-auto mb-4" />
            <h1 class="text-3xl font-bold text-white mb-2">Acromatico CRM</h1>
            <p class="text-slate-400 text-sm">AI-Powered Client Intelligence</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Email Input -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">
                    <i class="fas fa-envelope mr-2 text-slate-300"></i>Email
                </label>
                <input
                    type="email"
                    id="emailInput"
                    class="input-field w-full px-4 py-3 rounded-xl"
                    placeholder="italo@acromatico.com"
                    required
                    autocomplete="email"
                />
            </div>

            <!-- Password Input -->
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">
                    <i class="fas fa-lock mr-2 text-slate-300"></i>Password
                </label>
                <input
                    type="password"
                    id="passwordInput"
                    class="input-field w-full px-4 py-3 rounded-xl"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                />
            </div>

            <!-- Error Alert -->
            <div id="errorAlert" class="hidden p-4 bg-red-50 border-l-4 border-red-500 rounded-lg">
                <div class="flex items-center">
                    <i class="fas fa-exclamation-triangle text-red-500 mr-3"></i>
                    <div>
                        <p class="font-semibold text-red-800">Authentication Failed</p>
                        <p id="errorMessage" class="text-sm text-red-600 mt-1"></p>
                    </div>
                </div>
            </div>

            <!-- Success Alert -->
            <div id="successAlert" class="hidden p-4 bg-green-50 border-l-4 border-green-500 rounded-lg">
                <div class="flex items-center">
                    <i class="fas fa-check-circle text-green-500 mr-3"></i>
                    <p class="font-semibold text-green-800">Access Granted - Redirecting...</p>
                </div>
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                id="submitBtn"
                class="btn-primary w-full py-4 text-white font-bold rounded-xl flex items-center justify-center"
            >
                <span id="btnText">
                    <i class="fas fa-sign-in-alt mr-2"></i>Access Dashboard
                </span>
                <span id="btnSpinner" class="hidden">
                    <div class="spinner mr-3"></div>Processing...
                </span>
            </button>
        </form>

        <!-- Help Text -->
        <div class="mt-6 text-center text-sm text-slate-400">
            <i class="fas fa-shield-alt mr-1"></i>
            Secured with Email/Password Authentication
        </div>

        <!-- Quick Stats Preview -->
        <div class="mt-8 pt-6 border-t border-slate-600">
            <p class="text-xs text-slate-400 text-center mb-3">System Status</p>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div>
                    <div class="text-lg font-bold text-slate-300">🤖</div>
                    <div class="text-xs text-slate-400 mt-1">4 AI Agents</div>
                </div>
                <div>
                    <div class="text-lg font-bold text-green-600">⚡</div>
                    <div class="text-xs text-slate-400 mt-1">15s Response</div>
                </div>
                <div>
                    <div class="text-lg font-bold text-blue-600">📊</div>
                    <div class="text-xs text-slate-400 mt-1">Real-time BI</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // iPhone Safari viewport fix
        function setViewportHeight() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setViewportHeight();
        window.addEventListener('resize', setViewportHeight);

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const errorMessage = document.getElementById('errorMessage');

        // Check if already logged in
        const existingToken = localStorage.getItem('admin_token');
        if (existingToken) {
            // Redirect to dashboard immediately
            window.location.href = '/admin/crm/dashboard';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Clear previous alerts
            errorAlert.classList.add('hidden');
            successAlert.classList.add('hidden');
            
            // Basic validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            try {
                // Call login API
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Login failed');
                }

                // Store token in localStorage
                localStorage.setItem('admin_token', data.token);
                
                // ALSO set cookie for server-side navigation
                document.cookie = `admin_token=${data.token}; path=/; max-age=604800; SameSite=Lax`;
                
                // Show success
                successAlert.classList.remove('hidden');
                
                // Redirect after brief delay
                setTimeout(() => {
                    window.location.href = '/admin/crm/dashboard';
                }, 800);

            } catch (error) {
                showError(error.message || 'Authentication failed. Please check your credentials and try again.');
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorAlert.classList.remove('hidden');
            errorAlert.classList.add('error-shake');
            
            // Remove shake animation after it completes
            setTimeout(() => {
                errorAlert.classList.remove('error-shake');
            }, 500);
        }

        // Auto-focus on email input (with delay for iPhone Safari)
        setTimeout(() => {
            emailInput.focus();
        }, 300);
    </script>
</body>
</html>
