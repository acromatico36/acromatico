<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - Acromatico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    
    .cancel-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    
    .icon-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.2);
      border: 3px solid #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    
    .icon {
      font-size: 48px;
      color: #ef4444;
    }
    
    .btn {
      padding: 16px 32px;
      background: #4794A6;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      margin-top: 8px;
    }
    
    .btn:hover {
      background: #5aa5b8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(71, 148, 166, 0.3);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      margin-left: 12px;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    @media (max-width: 480px) {
      .cancel-container {
        padding: 32px 24px;
      }
      
      h1 {
        font-size: 28px;
      }
      
      .btn {
        width: 100%;
        margin-left: 0 !important;
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="cancel-container">
    <div class="icon-circle">
      <i class="fas fa-times icon"></i>
    </div>
    
    <h1 style="font-size: 32px; font-weight: 300; margin-bottom: 12px;">Payment Cancelled</h1>
    <p style="color: rgba(255, 255, 255, 0.7); font-size: 16px; margin-bottom: 24px;">
      Your payment was cancelled. No charges were made to your account.
    </p>
    
    <p style="color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: 32px;">
      If you experienced any issues or have questions, please don't hesitate to contact us.
    </p>
    
    <div>
      <button onclick="history.back()" class="btn">
        <i class="fas fa-arrow-left mr-2"></i>
        Try Again
      </button>
      
      <a href="/" class="btn btn-secondary">
        <i class="fas fa-home mr-2"></i>
        Back to Home
      </a>
    </div>
    
    <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
      <p style="color: rgba(255, 255, 255, 0.5); font-size: 12px;">
        Need help? Contact us at <a href="mailto:italo@acromatico.com" style="color: #4794A6; text-decoration: none;">italo@acromatico.com</a>
      </p>
    </div>
  </div>
</body>
</html>
