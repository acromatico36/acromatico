<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Acromatico Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #000;
            --bg-white: #fff;
            --accent: #4794A6;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            overflow-x: hidden;
            background: #000;
            color: white;
        }
        
        /* HAMBURGER MENU - FIXED TOP RIGHT */
        #menuToggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        #menuToggle:hover {
            transform: scale(1.05);
        }
        
        #menuToggle i {
            color: white;
            font-size: 20px;
        }
        
        /* HERO SECTION WITH BACKGROUND IMAGE */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url('https://acromatico.com/wp-content/uploads/2020/09/luca-newborn-1-1024x682.jpg') center/cover no-repeat;
            overflow: hidden;
        }
        
        /* Dark overlay for readability */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
        }
        
        /* ACTUAL LOGO IMAGE */
        .hero-logo {
            max-width: 400px;
            width: 80%;
            height: auto;
            margin-bottom: 24px;
            filter: brightness(0) invert(1);
            animation: fadeInUp 1s ease;
        }
        
        .hero-content p {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 48px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* BLOG GRID - STARTS AFTER HERO */
        .blog-container {
            background: white;
            min-height: 100vh;
            padding: 80px 40px;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .blog-card {
            position: relative;
            height: 320px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        
        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .blog-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: all 0.4s ease;
        }
        
        /* COLOR BY DEFAULT */
        .blog-card .blog-image {
            filter: none;
        }
        
        /* B&W ON HOVER */
        .blog-card:hover .blog-image {
            filter: grayscale(100%);
            transform: scale(1.05);
        }
        
        .blog-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 30px 20px;
            transition: all 0.4s ease;
        }
        
        .blog-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .hero-logo {
                max-width: 280px;
            }
            .hero-content p {
                font-size: 21px;
            }
            .blog-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            #menuToggle {
                top: 16px;
                right: 16px;
            }
        }
        
        @media (min-width: 769px) and (max-width: 1024px) {
            .blog-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* MOBILE MENU DRAWER STYLES - CRITICAL! */
        .ast-mobile-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .ast-mobile-popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .ast-mobile-popup-drawer {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 320px;
            max-width: 85vw;
            background: white;
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.2);
        }
        
        .ast-mobile-popup-drawer.active {
            transform: translateX(0);
        }
        
        .ast-mobile-popup-inner {
            padding: 24px;
        }
        
        .mobile-menu-logo {
            margin-bottom: 32px;
            text-align: center;
        }
        
        .mobile-menu-logo img {
            max-width: 180px;
            height: auto;
        }
        
        .mobile-menu-search {
            position: relative;
            margin-bottom: 32px;
        }
        
        .mobile-menu-search input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .mobile-menu-search input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(71, 148, 166, 0.1);
        }
        
        .mobile-menu-search button {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
        }
        
        .mobile-menu-nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .mobile-menu-nav ul li {
            margin-bottom: 8px;
        }
        
        .mobile-menu-nav ul li a {
            display: block;
            padding: 12px 16px;
            color: #1d1d1f;
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .mobile-menu-nav ul li a:hover {
            background: #f5f5f5;
            color: var(--accent);
        }
        
        .mobile-menu-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }
        
        .mobile-menu-tagline {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }
        
        .mobile-menu-social {
            display: flex;
            gap: 16px;
        }
        
        .mobile-menu-social a {
            color: #666;
            transition: color 0.3s ease;
        }
        
        .mobile-menu-social a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- HAMBURGER MENU BUTTON -->
    <button id="menuToggle" aria-label="Menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- HERO SECTION WITH ACTUAL LOGO -->
    <section class="hero">
        <div class="hero-content">
            <img src="/static/acromatico-logo-black.png" alt="Acromatico Photography" class="hero-logo">
            <p>Our Latest Stories</p>
        </div>
    </section>
    
    <!-- BLOG GRID -->
    <div class="blog-container">
        <div id="blog-grid" class="blog-grid">
            <div class="blog-card" style="background: #f0f0f0; display: flex; align-items: center; justify-content: center;">
                <p style="color: #666;">Loading blog posts...</p>
            </div>
        </div>
    </div>
    
    <!-- MOBILE MENU (injected from API) -->
    <div id="mobile-menu-container"></div>
    
    <!-- FOOTER (injected from API) -->
    <div id="footer-container"></div>
    
    <script>
        console.log('🚀 Blog index initializing...');
        
        // Fetch and inject mobile menu
        fetch('/api/mobile-menu')
            .then(res => res.text())
            .then(html => {
                document.getElementById('mobile-menu-container').innerHTML = html;
                console.log('✅ Mobile menu HTML loaded');
                
                // Wait a moment for scripts to execute
                setTimeout(() => {
                    const drawer = document.getElementById('drawer');
                    const overlay = document.getElementById('overlay');
                    const menuToggle = document.getElementById('menuToggle');
                    
                    if (!drawer || !overlay || !menuToggle) {
                        console.error('❌ Missing menu elements');
                        return;
                    }
                    
                    console.log('✅ Menu elements found, setting up toggle');
                    
                    // Setup toggle function
                    function toggleMenu() {
                        const isActive = drawer.classList.contains('active');
                        console.log('🍔 Menu toggle clicked, isActive:', isActive);
                        
                        if (isActive) {
                            drawer.classList.remove('active');
                            overlay.classList.remove('active');
                            menuToggle.classList.remove('active');
                            document.body.style.overflow = '';
                            console.log('✅ Menu closed');
                        } else {
                            drawer.classList.add('active');
                            overlay.classList.add('active');
                            menuToggle.classList.add('active');
                            document.body.style.overflow = 'hidden';
                            console.log('✅ Menu opened');
                        }
                    }
                    
                    // Attach click handler to hamburger
                    menuToggle.addEventListener('click', toggleMenu);
                    console.log('✅ Hamburger click listener attached');
                    
                    // Close on overlay click
                    overlay.addEventListener('click', toggleMenu);
                    
                    // Close on ESC key
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && drawer.classList.contains('active')) {
                            toggleMenu();
                        }
                    });
                    
                    // Close menu when clicking menu links
                    const menuLinks = drawer.querySelectorAll('a');
                    menuLinks.forEach(link => {
                        link.addEventListener('click', () => {
                            setTimeout(toggleMenu, 300);
                        });
                    });
                    
                    console.log('✅ Mobile menu fully initialized');
                }, 100);
            })
            .catch(err => console.error('❌ Mobile menu error:', err));
        
        // Fetch and inject footer
        fetch('/api/footer')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-container').innerHTML = html;
                console.log('✅ Footer loaded');
            })
            .catch(err => console.error('❌ Footer error:', err));
        
        // Fetch blog posts
        console.log('📥 Fetching blog posts...');
        fetch('/static/../blog_posts_data/all_posts.json')
            .then(res => res.json())
            .then(posts => {
                console.log(`✅ Loaded ${posts.length} posts`);
                
                const blogGrid = document.getElementById('blog-grid');
                blogGrid.innerHTML = '';
                
                posts.forEach(post => {
                    // Extract first image from content
                    let imageUrl = '';
                    
                    // Try data-src first (lazy loading)
                    const dataSrcMatch = post.content.rendered.match(/data-src=["']([^"']+)["']/);
                    if (dataSrcMatch && dataSrcMatch[1] && !dataSrcMatch[1].includes('data:image')) {
                        imageUrl = dataSrcMatch[1];
                    } else {
                        // Fallback to regular src
                        const srcMatch = post.content.rendered.match(/src=["']([^"']+)["']/);
                        if (srcMatch && srcMatch[1] && !srcMatch[1].includes('data:image')) {
                            imageUrl = srcMatch[1];
                        }
                    }
                    
                    // Create card
                    const card = document.createElement('a');
                    card.className = 'blog-card';
                    card.href = `/static/blog/${post.slug}.html`;
                    
                    card.innerHTML = `
                        <div class="blog-image" style="background-image: url('${imageUrl}')"></div>
                        <div class="blog-overlay">
                            <h3 class="blog-title">${post.title.rendered}</h3>
                        </div>
                    `;
                    
                    blogGrid.appendChild(card);
                });
                
                console.log(`✅ Rendered ${posts.length} blog cards with images`);
            })
            .catch(err => {
                console.error('❌ Error loading posts:', err);
                document.getElementById('blog-grid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">
                        <p>Error loading blog posts. Please refresh the page.</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
