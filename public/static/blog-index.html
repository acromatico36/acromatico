<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Acromatico Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #000;
            --bg-white: #fff;
            --accent: #4794A6;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            background: #000;
            color: white;
        }
        
        /* EXACT HAMBURGER FROM BLOG POSTS */
        .menu-toggle {
            position: fixed;
            top: 25px;
            right: 30px;
            z-index: 10000;
            background: transparent;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .menu-toggle span {
            display: block;
            width: 30px;
            height: 2px;
            background: #ffffff;
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        
        .menu-toggle:hover span {
            background: #4794A6;
        }
        
        .menu-toggle.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        
        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        
        .menu-toggle.active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
        
        /* EXACT DRAWER FROM BLOG POSTS */
        .ast-mobile-popup-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: #f8f8f8;
            z-index: 9998;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
        }
        
        .ast-mobile-popup-drawer.active {
            right: 0;
        }
        
        .ast-mobile-popup-inner {
            padding: 60px 50px 40px;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }
        
        .mobile-menu-logo {
            max-width: 180px;
            margin: 0 auto 30px auto;
            filter: none;
            text-align: center;
        }
        
        .mobile-menu-logo img {
            width: 100%;
            height: auto;
        }
        
        .mobile-menu-search {
            margin-bottom: 50px;
            position: relative;
        }
        
        .mobile-menu-search input {
            width: 100%;
            padding: 15px 45px 15px 20px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #4a4a4a;
            transition: all 0.3s ease;
        }
        
        .mobile-menu-search input:focus {
            outline: none;
            border-color: #4794A6;
            box-shadow: 0 0 0 3px rgba(71, 148, 166, 0.1);
        }
        
        .mobile-menu-search input::placeholder {
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 11px;
        }
        
        .mobile-menu-search button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 10px 15px;
            color: #999;
            transition: color 0.3s ease;
        }
        
        .mobile-menu-search button:hover {
            color: #4794A6;
        }
        
        .mobile-menu-nav {
            flex: 1;
        }
        
        .mobile-menu-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }
        
        .mobile-menu-nav li {
            margin-bottom: 8px;
        }
        
        .mobile-menu-nav a {
            display: inline-block;
            padding: 18px 0;
            color: #4a4a4a;
            text-decoration: none;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        
        .mobile-menu-nav a:hover,
        .mobile-menu-nav a.active {
            color: #4794A6;
        }
        
        .mobile-menu-footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #ddd;
            text-align: center;
        }
        
        .mobile-menu-tagline {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 20px;
        }
        
        .mobile-menu-social {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .mobile-menu-social a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .mobile-menu-social a:hover {
            background: #4794A6;
            transform: translateY(-3px);
        }
        
        .ast-mobile-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9997;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .ast-mobile-popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* HERO SECTION */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url('https://acromatico.com/wp-content/uploads/2020/09/luca-newborn-1-1024x682.jpg') center/cover no-repeat;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
        }
        
        .hero-logo {
            max-width: 400px;
            width: 80%;
            height: auto;
            filter: brightness(0) invert(1);
            animation: fadeInUp 1s ease;
        }
        
        .hero-content p {
            font-size: 28px;
            font-weight: 300;
            margin-top: 24px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease 0.2s both;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* BLOG GRID */
        .blog-container {
            background: white;
            min-height: 100vh;
            padding: 80px 40px;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .blog-card {
            position: relative;
            height: 320px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        
        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .blog-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: all 0.4s ease;
        }
        
        .blog-card .blog-image {
            filter: none;
        }
        
        .blog-card:hover .blog-image {
            filter: grayscale(100%);
            transform: scale(1.05);
        }
        
        .blog-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 30px 20px;
        }
        
        .blog-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
        }
        
        @media (max-width: 768px) {
            .hero-logo { max-width: 280px; }
            .hero-content p { font-size: 21px; }
            .blog-grid { grid-template-columns: 1fr; gap: 30px; }
            .menu-toggle { top: 16px; right: 16px; }
        }
        
        @media (min-width: 769px) and (max-width: 1024px) {
            .blog-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- EXACT HAMBURGER FROM BLOG POSTS -->
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <img src="/static/acromatico-logo-black.png" alt="Acromatico Photography" class="hero-logo">
            <p>Our Latest Stories</p>
        </div>
    </section>
    
    <!-- BLOG GRID -->
    <div class="blog-container">
        <div id="blog-grid" class="blog-grid">
            <div class="blog-card" style="background: #f0f0f0; display: flex; align-items: center; justify-content: center;">
                <p style="color: #666;">Loading blog posts...</p>
            </div>
        </div>
    </div>
    
    <!-- DYNAMIC MOBILE MENU - Loaded from /api/mobile-menu API -->
    <div id="mobile-menu-container"></div>
    
    <!-- FOOTER -->
    <div id="footer-container"></div>
    
    <script>
        console.log('🚀 Blog index initializing...');
        
        // Load mobile menu dynamically from server - EXACT SAME AS BLOG POSTS
        (function() {
            fetch('/api/mobile-menu')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('mobile-menu-container').innerHTML = html;
                    console.log('✅ Mobile menu loaded');
                    
                    // Execute any scripts in the loaded HTML
                    const scripts = document.getElementById('mobile-menu-container').querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        if (script.src) {
                            newScript.src = script.src;
                        } else {
                            newScript.textContent = script.textContent;
                        }
                        document.body.appendChild(newScript);
                    });
                })
                .catch(error => console.error('❌ Mobile menu error:', error));
        })();
        
        // Load footer dynamically from server
        (function() {
            fetch('/api/footer')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('footer-container').innerHTML = html;
                    console.log('✅ Footer loaded');
                })
                .catch(error => console.error('❌ Footer error:', error));
        })();
        
        // Fetch blog posts
        console.log('📥 Fetching blog posts...');
        fetch('/static/../blog_posts_data/all_posts.json')
            .then(res => res.json())
            .then(posts => {
                console.log(`✅ Loaded ${posts.length} posts`);
                
                const blogGrid = document.getElementById('blog-grid');
                blogGrid.innerHTML = '';
                
                posts.forEach(post => {
                    let imageUrl = '';
                    
                    const dataSrcMatch = post.content.rendered.match(/data-src=["']([^"']+)["']/);
                    if (dataSrcMatch && dataSrcMatch[1] && !dataSrcMatch[1].includes('data:image')) {
                        imageUrl = dataSrcMatch[1];
                    } else {
                        const srcMatch = post.content.rendered.match(/src=["']([^"']+)["']/);
                        if (srcMatch && srcMatch[1] && !srcMatch[1].includes('data:image')) {
                            imageUrl = srcMatch[1];
                        }
                    }
                    
                    const card = document.createElement('a');
                    card.className = 'blog-card';
                    card.href = `/static/blog/${post.slug}.html`;
                    
                    card.innerHTML = `
                        <div class="blog-image" style="background-image: url('${imageUrl}')"></div>
                        <div class="blog-overlay">
                            <h3 class="blog-title">${post.title.rendered}</h3>
                        </div>
                    `;
                    
                    blogGrid.appendChild(card);
                });
                
                console.log(`✅ Rendered ${posts.length} blog cards with images`);
            })
            .catch(err => {
                console.error('❌ Error loading posts:', err);
            });
    </script>
</body>
</html>
